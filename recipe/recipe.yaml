context:
  version: "0.4.0"

package:
  name: absurdctl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/absurdctl/absurdctl-${{ version }}.tar.gz
  sha256: 060500f84ae0ac27af737e0e70d6e16e3cb12c5aed56a53f7f27841c1a7005a7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - absurdctl = absurdctl:main

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.10.0,<0.11.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - absurdctl
      pip_check: true
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - absurdctl --help

about:
  summary: CLI for managing Absurd schemas, queues, tasks, and events
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/earendil-works/absurd
  documentation: https://github.com/earendil-works/absurd/blob/main/docs/absurdctl.md

extra:
  recipe-maintainers:
    - xhochy
